<!doctype html>
<html lang="pl">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no,viewport-fit=cover" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Voice Inbox" />
<meta name="theme-color" content="#0b0d10" />
<title>Voice Inbox</title>
<link rel="manifest" href="/manifest.webmanifest" />
<link rel="icon" href="/icon.svg" type="image/svg+xml" />
<link rel="apple-touch-icon" href="/icon.svg" />
<style>
  :root { color-scheme: dark; }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body {
    margin: 0; min-height: 100dvh;
    background: #0b0d10; color: #e7eaee;
    font: 16px -apple-system, system-ui, sans-serif;
    display: flex; flex-direction: column;
  }
  header {
    padding: 14px 16px max(14px, env(safe-area-inset-top)) 16px;
    display: flex; justify-content: space-between; align-items: center;
    border-bottom: 1px solid #1a1d22;
  }
  header h1 { margin: 0; font-size: 15px; font-weight: 600; letter-spacing: 0.5px; }
  header .right { display: flex; gap: 8px; }
  header button, #project-select {
    background: none; border: 1px solid #2a2f36; color: #9aa3ad;
    padding: 6px 10px; border-radius: 8px; font-size: 12px;
  }
  main { flex: 1; padding: 8px 16px 16px; overflow-y: auto; }
  .turn {
    margin: 6px 0; padding: 9px 13px; border-radius: 14px; max-width: 85%;
    line-height: 1.4; font-size: 15px;
  }
  .user { background: #1f2a3a; margin-left: auto; border-bottom-right-radius: 4px; }
  .bot { background: #1a1d22; border-bottom-left-radius: 4px; }
  .meta { font-size: 11px; color: #6b7480; margin: 2px 8px; }
  .status {
    color: #6b7480; font-size: 13px; text-align: center;
    padding: 6px; min-height: 24px;
  }
  footer {
    padding: 16px 16px max(16px, env(safe-area-inset-bottom));
    display: flex; justify-content: center;
  }
  #ptt {
    width: 128px; height: 128px; border-radius: 50%;
    background: #2563eb; color: white; border: none;
    font-size: 14px; font-weight: 600; letter-spacing: 0.5px;
    user-select: none; -webkit-user-select: none; touch-action: none;
    transition: transform 0.08s, background 0.12s;
    box-shadow: 0 8px 24px rgba(37, 99, 235, 0.35);
  }
  #ptt.rec { background: #dc2626; transform: scale(1.08); box-shadow: 0 8px 32px rgba(220, 38, 38, 0.5); }
  #ptt:disabled { background: #374151; box-shadow: none; }
  #perm-banner {
    background: #7c2d12; border-bottom: 1px solid #c2410c;
    color: #fed7aa; padding: 12px 16px; display: none;
  }
  #perm-banner.visible { display: block; }
  #perm-banner .title { font-weight: 600; font-size: 14px; margin-bottom: 4px; }
  #perm-banner .desc { font-size: 13px; color: #fde68a; margin-bottom: 10px; line-height: 1.35; word-break: break-word; }
  #perm-banner .actions { display: flex; gap: 8px; }
  #perm-banner button {
    flex: 1; padding: 10px; border-radius: 8px; border: none;
    font-size: 14px; font-weight: 600; letter-spacing: 0.3px;
  }
  #perm-banner .allow { background: #16a34a; color: white; }
  #perm-banner .deny { background: #525252; color: white; }
  #perm-banner .hint { font-size: 11px; color: #fbbf24; margin-top: 8px; text-align: center; }
  option.live { color: #86efac; }
</style>
</head>
<body>
<header>
  <h1>VOICE INBOX</h1>
  <div class="right">
    <select id="project-select" title="Target">
      <option value="">Ask (bot)</option>
    </select>
    <button id="status-btn" title="Status">Status</button>
    <button id="reset-btn" title="Wyczyść log">Reset</button>
  </div>
</header>
<div id="perm-banner">
  <div class="title" id="perm-title">Claude prosi o zgodę</div>
  <div class="desc" id="perm-desc"></div>
  <div class="actions">
    <button class="allow" id="perm-allow">Tak</button>
    <button class="deny" id="perm-deny">Nie</button>
  </div>
  <div class="hint">Głosem: "tak tak tak" / "nie nie nie"</div>
</div>
<main id="log"></main>
<div class="status" id="status">Wybierz target i przytrzymaj. Na Macu: spacja.</div>
<footer>
  <button id="ptt">Przytrzymaj</button>
</footer>
<audio id="player" playsinline preload="auto" style="display:none"></audio>
<script>
const ptt = document.getElementById('ptt');
const log = document.getElementById('log');
const status = document.getElementById('status');
const resetBtn = document.getElementById('reset-btn');
const statusBtn = document.getElementById('status-btn');
const projectSelect = document.getElementById('project-select');
const player = document.getElementById('player');
const permBanner = document.getElementById('perm-banner');
const permTitle = document.getElementById('perm-title');
const permDesc = document.getElementById('perm-desc');
const permAllowBtn = document.getElementById('perm-allow');
const permDenyBtn = document.getElementById('perm-deny');

const SILENT_WAV = 'data:audio/wav;base64,UklGRiQAAABXQVZFZm10IBAAAAABAAEAQB8AAEAfAAABAAgAZGF0YQAAAAA=';
let audioUnlocked = false;
function unlockAudio() {
  if (audioUnlocked) return;
  try { player.src = SILENT_WAV; player.play().then(() => { audioUnlocked = true; }).catch(() => {}); } catch (_) {}
}

let mediaRecorder = null;
let chunks = [];
let stream = null;
let activeProjects = new Set();  // projects with a live CC session (from /channels/active)
let currentPending = null;       // top pending permission or null

function pickMime() {
  const types = ['audio/webm;codecs=opus', 'audio/webm', 'audio/mp4', 'audio/mpeg', 'audio/wav'];
  return types.find(t => window.MediaRecorder && MediaRecorder.isTypeSupported(t)) || '';
}

async function ensureStream() {
  if (stream && stream.active) return stream;
  stream = await navigator.mediaDevices.getUserMedia({ audio: true });
  return stream;
}

function addTurn(text, who, meta) {
  const div = document.createElement('div');
  div.className = 'turn ' + who;
  div.textContent = text;
  log.appendChild(div);
  if (meta) {
    const m = document.createElement('div');
    m.className = 'meta';
    m.textContent = meta;
    if (who === 'user') m.style.textAlign = 'right';
    log.appendChild(m);
  }
  log.scrollTop = log.scrollHeight;
  return div;
}

function addMeta(text) {
  const m = document.createElement('div');
  m.className = 'meta';
  m.textContent = text;
  m.style.textAlign = 'center';
  log.appendChild(m);
  log.scrollTop = log.scrollHeight;
}

function selectedTargetIsLive() {
  return projectSelect.value && activeProjects.has(projectSelect.value);
}

async function start() {
  if (mediaRecorder && mediaRecorder.state === 'recording') return;
  unlockAudio();
  try { player.pause(); } catch (_) {}
  try {
    await ensureStream();
    chunks = [];
    const mime = pickMime();
    mediaRecorder = new MediaRecorder(stream, mime ? { mimeType: mime } : undefined);
    mediaRecorder.ondataavailable = e => { if (e.data.size) chunks.push(e.data); };
    mediaRecorder.onstop = onStop;
    mediaRecorder.start();
    ptt.classList.add('rec');
    ptt.textContent = 'Mów…';
    const target = projectSelect.value || 'ask-bot';
    status.textContent = `Nagrywam → ${target}`;
  } catch (e) {
    status.textContent = 'Błąd mikrofonu: ' + e.message;
  }
}

function stop() {
  if (!mediaRecorder || mediaRecorder.state !== 'recording') return;
  mediaRecorder.stop();
  ptt.classList.remove('rec');
  ptt.textContent = 'Przetwarzam…';
  ptt.disabled = true;
  status.textContent = 'Wysyłam…';
}

async function onStop() {
  const blob = new Blob(chunks, { type: chunks[0]?.type || 'audio/webm' });
  const ext = (blob.type.split('/')[1] || 'webm').split(';')[0];
  const fd = new FormData();
  fd.append('audio', blob, `clip.${ext}`);

  const liveTarget = selectedTargetIsLive();
  try {
    if (liveTarget) {
      // channel mode: STT + routing on backend (push / permission-allow / permission-deny)
      fd.append('project', projectSelect.value);
      const r = await fetch('/channels/voice', { method: 'POST', body: fd });
      if (!r.ok) throw new Error('HTTP ' + r.status);
      const data = await r.json();
      if (data.transcript) addTurn(data.transcript, 'user', `→ ${data.project}`);
      if (data.action === 'push') {
        addMeta(`wysłane do ${data.project}`);
      } else if (data.action === 'permission_allow') {
        addMeta(data.resolved ? `✓ allow ${data.resolved.tool_name}` : '✓ allow (brak pending)');
      } else if (data.action === 'permission_deny') {
        addMeta(data.resolved ? `✗ deny ${data.resolved.tool_name}` : '✗ deny (brak pending)');
      } else if (data.action === 'empty') {
        addMeta('pusty transcript');
      } else {
        addMeta(`action: ${data.action || 'noop'}`);
      }
      status.textContent = '';
      // refresh pending banner now
      pollPermissions();
    } else {
      // ask-bot mode (existing /voice endpoint)
      if (projectSelect.value) fd.append('project', projectSelect.value);
      const r = await fetch('/voice', { method: 'POST', body: fd });
      if (!r.ok) throw new Error('HTTP ' + r.status);
      const data = await r.json();
      if (data.transcript) addTurn(data.transcript, 'user');
      if (data.answer) addTurn(data.answer, 'bot');
      status.textContent = '';
      if (data.audio_b64 && data.mime) {
        player.src = `data:${data.mime};base64,${data.audio_b64}`;
        try {
          await player.play();
        } catch (err) {
          status.textContent = 'Kliknij ekran żeby odblokować dźwięk';
          const resume = () => { player.play().catch(() => {}); document.removeEventListener('click', resume); };
          document.addEventListener('click', resume, { once: true });
        }
      }
    }
  } catch (e) {
    status.textContent = 'Błąd: ' + e.message;
  } finally {
    ptt.disabled = false;
    ptt.textContent = 'Przytrzymaj';
  }
}

ptt.addEventListener('pointerdown', e => { e.preventDefault(); start(); });
ptt.addEventListener('pointerup', e => { e.preventDefault(); stop(); });
ptt.addEventListener('pointercancel', stop);
ptt.addEventListener('pointerleave', stop);

window.addEventListener('keydown', e => {
  if (e.code !== 'Space' || e.repeat) return;
  if (document.activeElement && document.activeElement.tagName === 'SELECT') return;
  e.preventDefault(); start();
});
window.addEventListener('keyup', e => {
  if (e.code === 'Space') { e.preventDefault(); stop(); }
});

resetBtn.addEventListener('click', () => {
  log.innerHTML = '';
  status.textContent = 'Reset';
});

statusBtn.addEventListener('click', async () => {
  try {
    const r = await fetch('/status?hours=24');
    const data = await r.json();
    if (!data.ok) { status.textContent = 'Status error'; return; }
    const projects = data.projects || [];
    log.innerHTML = '';
    if (!projects.length) {
      addTurn('Brak aktywności w ostatnich 24h.', 'bot');
    } else {
      const lines = projects.map(p =>
        `${p.project} / ${p.source}: ${p.count} events`
      ).join('\n');
      addTurn('Aktywność 24h:\n' + lines, 'bot');
    }
  } catch (e) {
    status.textContent = 'Status error: ' + e.message;
  }
});

async function refreshProjectSelect() {
  // merge active CC sessions (from /channels/active) with historical projects (from /status)
  let active = [];
  try {
    const r = await fetch('/channels/active');
    if (r.ok) {
      const data = await r.json();
      active = (data.projects || []).map(p => p.project);
    }
  } catch (_) {}
  activeProjects = new Set(active);

  let historical = [];
  try {
    const r = await fetch('/status?hours=24');
    if (r.ok) {
      const data = await r.json();
      historical = [...new Set((data.projects || []).map(p => p.project).filter(Boolean))];
    }
  } catch (_) {}

  const current = projectSelect.value;
  const all = [...new Set([...active, ...historical])];
  const opts = ['<option value="">Ask (bot)</option>'];
  for (const p of all) {
    const isLive = activeProjects.has(p);
    const label = isLive ? `🟢 ${p} (live)` : p;
    const cls = isLive ? ' class="live"' : '';
    const sel = p === current ? ' selected' : '';
    opts.push(`<option value="${p}"${cls}${sel}>${label}</option>`);
  }
  projectSelect.innerHTML = opts.join('');
}

async function pollPermissions() {
  try {
    const r = await fetch('/channels/permissions/pending');
    if (!r.ok) return;
    const data = await r.json();
    const pending = data.pending || [];
    // pick the oldest pending matching our selected project, or just oldest overall
    let top = null;
    if (projectSelect.value) {
      top = pending.find(p => p.project === projectSelect.value) || null;
    }
    if (!top && pending.length) top = pending[0];
    if (top) {
      const prev = currentPending;
      currentPending = top;
      permTitle.textContent = `Claude w ${top.project}: ${top.tool_name}`;
      permDesc.textContent = top.description + (top.input_preview ? `\n${top.input_preview}` : '');
      permBanner.classList.add('visible');
      // audio cue on NEW pending (not seen before by request_id)
      if (!prev || prev.request_id !== top.request_id) {
        unlockAudio();
      }
    } else {
      currentPending = null;
      permBanner.classList.remove('visible');
    }
  } catch (_) {}
}

async function respondPermission(behavior) {
  if (!currentPending) return;
  try {
    const r = await fetch('/channels/permissions/respond', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ project: currentPending.project, behavior }),
    });
    if (!r.ok) throw new Error('HTTP ' + r.status);
    const data = await r.json();
    if (data.resolved) {
      addMeta(`${behavior === 'allow' ? '✓ allow' : '✗ deny'} ${data.resolved.tool_name} (${currentPending.project})`);
    }
    currentPending = null;
    permBanner.classList.remove('visible');
    pollPermissions();
  } catch (e) {
    status.textContent = 'Respond error: ' + e.message;
  }
}

permAllowBtn.addEventListener('click', () => respondPermission('allow'));
permDenyBtn.addEventListener('click', () => respondPermission('deny'));

// boot
refreshProjectSelect();
pollPermissions();
setInterval(refreshProjectSelect, 15000);  // active CC sessions may come and go
setInterval(pollPermissions, 2000);        // responsive banner
</script>
</body>
</html>
